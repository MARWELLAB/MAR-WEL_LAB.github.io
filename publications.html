<section class="section">
    <div class="container">

        <!-- Page Statistics -->
        <div class="publication-header">

            <h2 class="section-title">Research Publications</h2>

            <p class="section-intro">
                Peer-reviewed journal articles published by the
                Marine Aquaculture, Risers & Wave Energy Laboratory
                (MAR-WEL LAB), Department of Ocean Engineering,
                IIT Madras.
            </p>

            <div class="publication-stats">

                <div class="stat-card">
                    <h3 id="paperCount">0</h3>
                    <span>Journal Articles</span>
                </div>

                <div class="stat-card">
                    <h3 id="yearCount">2019–2026</h3>
                    <span>Publication Years</span>
                </div>

                <div class="stat-card">
                    <h3 id="journalCount">0</h3>
                    <span>Journals</span>
                </div>

            </div>

        </div>

        <!-- Search and Filter -->

        <div class="publication-toolbar">

            <input
                type="text"
                id="searchPublication"
                placeholder="Search by title, author, journal or year...">

            <select id="journalFilter">
                <option value="all">All Journals</option>
            </select>

        </div>

        <!-- Publication Container -->

        <div id="publicationContainer">

        </div>

    </div>
</section>

<script src="js/publications.js"></script>
